name: Terraform CI/CD

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Execute terraform apply?'
        required: true
        default: 'false'
        type: choice
        options:
          - Yes
          - No
      
      destroy:
        description: 'Execute terraform destroy?'
        required: true
        default: 'false'
        type: choice
        options:
          - Yes
          - No

permissions:
  id-token: write
  contents: read

jobs:
  Infraestructure:
    name: Terraform CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./terraform

    steps:
    
    # Clone repo in the VM
      - name: Checkout
        uses: actions/checkout@v5.0.0

    # Configure the AWS Credentials
      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::547320736290:role/github-actions-ecr-eks-role
          aws-region: eu-north-1

    # Setup terraform
      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.1

    # Terraform commands
      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out tfplan
      
      - name: Terraform Apply  
        run: terraform apply -auto-approve tfplan
        if: github.event.inputs.apply == 'true'
    
      - name: Terraform Destroy  
        run: terraform apply --destroy -auto-approve tfplan
        if: github.event.inputs.destroy == 'true'

  